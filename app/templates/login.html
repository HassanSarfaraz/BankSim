{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 100px auto;" class="glass animate-fade-in">
    <div class="card">
        <h2 style="margin-top: 0; text-align: center;">Secure Login</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Enter your credentials to access your portal</p>
        
        <form method="POST">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                <input type="text" name="username" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                <input type="password" name="password" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            <p>Admin Login: admin / admin123</p>
            <p style="margin-top: 1rem;">
                Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--accent); text-decoration: none;">Request Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
