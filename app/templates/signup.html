{% extends "base.html" %}

{% block content %}
<div style="max-width: 450px; margin: 50px auto;" class="glass animate-fade-in">
    <div class="card">
        <h2 style="margin-top: 0; text-align: center; color: var(--primary);">BankSim</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Request a new account</p>
        
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">First Name</label>
                    <input type="text" name="first_name" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Last Name</label>
                    <input type="text" name="last_name" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
                </div>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                <input type="text" name="username" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
            </div>

            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                <input type="password" name="password" class="glass" style="width: 100%; padding: 0.75rem; border: 1px solid var(--glass-border); color: white; box-sizing: border-box;" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Request</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            <a href="{{ url_for('auth.login') }}" style="color: var(--accent); text-decoration: none;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
